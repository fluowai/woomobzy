name: CI

on:
  push:
    branches: [main, develop, 'codex/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Validate deploy config
        run: npm run check-deploy-config
      - name: Run ESLint
        run: npm run lint
      - name: Run TypeScript type check
        run: npm run type-check

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test -- --run

  whatsapp-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: whatsapp-service
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: whatsapp-service/go.mod
          cache-dependency-path: whatsapp-service/go.sum
      - name: Verify modules
        run: go mod download && go mod verify
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test ./...
      - name: Race tests
        run: go test -race ./...
      - name: Build
        run: go build ./cmd/server

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, whatsapp-go]

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
