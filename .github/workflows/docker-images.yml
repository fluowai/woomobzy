name: Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            image: ghcr.io/fluowai/woomobzy-frontend
            dockerfile: Dockerfile.frontend
            deployment_alias: ghcr.io/fluowai/woomobzy-frontend:latest
          - name: api
            image: ghcr.io/fluowai/woomobzy-api
            dockerfile: Dockerfile.api
            # Portainer currently references this tag in its stored stack definition.
            deployment_alias: ghcr.io/fluowai/woomobzy-api:5daaa4a05b3d9f85556d4c41b1d23b655e44bfa7
          - name: whatsapp
            image: ghcr.io/fluowai/woomobzy-whatsapp
            dockerfile: Dockerfile.whatsapp
            deployment_alias: ghcr.io/fluowai/woomobzy-whatsapp:latest
          - name: agro
            image: ghcr.io/fluowai/woomobzy-agro
            dockerfile: Dockerfile.agro
            deployment_alias: ghcr.io/fluowai/woomobzy-agro:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
            ${{ matrix.deployment_alias }}
          build-args: |
            VITE_API_URL=same-origin
            VITE_WHATSAPP_API_URL=/api/whatsapp
            VITE_WHATSAPP_WS_URL=/api/whatsapp/ws
            VITE_SUPABASE_URL=runtime
            VITE_SUPABASE_ANON_KEY=runtime
            VITE_PANEL_URL=https://crmimobzy.consultio.com.br

  deploy-portainer:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Redeploy Portainer stack
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL is not configured. Images were published, but Portainer redeploy was skipped."
            exit 0
          fi

          curl --fail --show-error --silent \
            --request POST \
            "$PORTAINER_WEBHOOK_URL"

      - name: Verify production API routes
        run: |
          for attempt in $(seq 1 12); do
            system_status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              https://imobfluow.com.br/api/system-status)
            properties_status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              "https://imobfluow.com.br/api/properties?page=1&limit=1")

            if [ "$system_status" = "200" ] && [ "$properties_status" = "401" ]; then
              echo "Production API is serving the current route set."
              exit 0
            fi

            echo "Attempt $attempt/12: system-status=$system_status properties=$properties_status"
            sleep 10
          done

          echo "Production is still routing to an outdated or incorrect API service."
          exit 1
