name: osv-scanner
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'  # semanal, seg 05:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1.9.1
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
