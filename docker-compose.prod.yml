services:
  proxy:
    image: caddy:2.8-alpine
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - imobzy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: same-origin
        VITE_WHATSAPP_API_URL: /api/whatsapp
        VITE_WHATSAPP_WS_URL: /api/whatsapp/ws
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_PANEL_URL: ${APP_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - imobzy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3002
      WHATSAPP_API_URL: http://whatsapp-service:3100
      WHATSMEOW_URL: http://whatsapp-service:3100
      AGRO_INTEL_URL: http://agro-intelligence:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      whatsapp-service:
        condition: service_healthy
      agro-intelligence:
        condition: service_started
    expose:
      - "3002"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - imobzy
    restart: unless-stopped

  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3100
      NODE_URL: http://api:3002
      WHATSMEOW_URL: http://whatsapp-service:3100
      WHATSAPP_API_URL: http://whatsapp-service:3100
      PGSSLMODE: require
      CORS_ORIGINS: ${CORS_ORIGINS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - whatsapp_sessions:/app/.sessions
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3100/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - imobzy
    restart: unless-stopped

  agro-intelligence:
    build:
      context: .
      dockerfile: Dockerfile.agro
    expose:
      - "8000"
    networks:
      - imobzy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  whatsapp_sessions:

networks:
  imobzy:
    driver: bridge
