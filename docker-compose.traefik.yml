version: "3.8"

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/traefik/dynamic
      - ./traefik/acme.json:/acme.json
    networks:
      - imobzy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.imobzy_frontend.loadbalancer.server.port=80"
      # As rotas para os dominios dinamicos serao injetadas via file provider
    networks:
      - imobzy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.imobzy_api.loadbalancer.server.port=3002"
    environment:
      TRAEFIK_DYNAMIC_DIR: "/app/traefik/dynamic"
    volumes:
      - ./traefik/dynamic:/app/traefik/dynamic
    networks:
      - imobzy

  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    restart: unless-stopped
    networks:
      - imobzy

networks:
  imobzy:
    driver: bridge
