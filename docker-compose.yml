name: imobzy

services:
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/traefik/dynamic:ro
      - traefik_acme:/traefik
    networks:
      - imobzy
    cpus: "0.50"
    mem_limit: 256m
    logging: &default-logging
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_PANEL_URL: ${APP_URL:-https://imob.wootech.com.br}
    env_file:
      - .env.production
    environment:
      VITE_API_URL: same-origin
      VITE_WHATSAPP_API_URL: /api/whatsapp
      VITE_WHATSAPP_WS_URL: /api/whatsapp/ws
      VITE_PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://imob.wootech.com.br}
      VITE_PANEL_URL: ${APP_URL:-https://imob.wootech.com.br}
      VITE_PLATFORM_IP: ${PLATFORM_PUBLIC_IP:-207.58.153.219}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - imobzy
    cpus: "0.50"
    mem_limit: 256m
    logging: *default-logging
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3002
      TRAEFIK_DYNAMIC_DIR: /traefik/dynamic
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-whatsmeow}
      WAHA_ENGINE: ${WAHA_ENGINE:-noweb}
      WHATSAPP_API_URL: http://whatsapp-service:3100
      WHATSMEOW_URL: http://whatsapp-service:3100
      WAHA_API_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:-${ARRAPHA_API_KEY:-}}
      ARRAPHA_API_URL: http://waha:3000
      ARRAPHA_API_KEY: ${ARRAPHA_API_KEY:-}
      WHATSAPP_SERVICE_TOKEN: ${WHATSAPP_SERVICE_TOKEN:?set WHATSAPP_SERVICE_TOKEN}
      WHATSAPP_INTERNAL_TOKEN: ${WHATSAPP_INTERNAL_TOKEN:?set WHATSAPP_INTERNAL_TOKEN}
      WHATSAPP_WS_JWT_SECRET: ${WHATSAPP_WS_JWT_SECRET:?set WHATSAPP_WS_JWT_SECRET}
      DOCUMENT_WEBHOOK_SECRET: ${DOCUMENT_WEBHOOK_SECRET:?set DOCUMENT_WEBHOOK_SECRET}
      SIGNATURE_WEBHOOK_SECRET: ${SIGNATURE_WEBHOOK_SECRET:?set SIGNATURE_WEBHOOK_SECRET}
      AGRO_INTEL_URL: http://agro-intelligence:8000
      NODE_URL: http://api:3002
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://imob.wootech.com.br,https://app.wootech.com.br,https://wootech.com.br,https://www.wootech.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br,https://fazendasbrasil.com,https://www.fazendasbrasil.com,https://fazendasbrasil.com.br,https://www.fazendasbrasil.com.br}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://imob.wootech.com.br,https://app.wootech.com.br,https://wootech.com.br,https://www.wootech.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br,https://fazendasbrasil.com,https://www.fazendasbrasil.com,https://fazendasbrasil.com.br,https://www.fazendasbrasil.com.br}
    volumes:
      - ./traefik/dynamic:/traefik/dynamic
    expose:
      - "3002"
    depends_on:
      whatsapp-service:
        condition: service_healthy
      agro-intelligence:
        condition: service_started
      document-worker:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - imobzy
    cpus: "1.00"
    mem_limit: 768m
    logging: *default-logging
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    profiles:
      - waha
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY:-${ARRAPHA_API_KEY:-}}
      WAHA_ENGINE: ${WAHA_ENGINE:-noweb}
      WAHA_PRINT_QR: "false"
      WAHA_LOG_FORMAT: JSON
    volumes:
      - waha_sessions:/app/.sessions
    expose:
      - "3000"
    networks:
      - imobzy
    cpus: "1.00"
    mem_limit: 768m
    logging: *default-logging
    restart: unless-stopped

  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3100
      NODE_URL: http://api:3002
      WHATSMEOW_URL: http://whatsapp-service:3100
      WHATSAPP_API_URL: http://whatsapp-service:3100
      WHATSAPP_SERVICE_TOKEN: ${WHATSAPP_SERVICE_TOKEN:?set WHATSAPP_SERVICE_TOKEN}
      WHATSAPP_INTERNAL_TOKEN: ${WHATSAPP_INTERNAL_TOKEN:?set WHATSAPP_INTERNAL_TOKEN}
      PGSSLMODE: require
      CORS_ORIGINS: ${CORS_ORIGINS:-https://imob.wootech.com.br,https://app.wootech.com.br,https://wootech.com.br,https://www.wootech.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br,https://fazendasbrasil.com,https://www.fazendasbrasil.com,https://fazendasbrasil.com.br,https://www.fazendasbrasil.com.br}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://imob.wootech.com.br,https://app.wootech.com.br,https://wootech.com.br,https://www.wootech.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br,https://fazendasbrasil.com,https://www.fazendasbrasil.com,https://fazendasbrasil.com.br,https://www.fazendasbrasil.com.br}
    volumes:
      - whatsapp_sessions:/app/.sessions
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3100/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - imobzy
    cpus: "1.50"
    mem_limit: 1g
    logging: *default-logging
    restart: unless-stopped

  agro-intelligence:
    build:
      context: .
      dockerfile: Dockerfile.agro
    expose:
      - "8000"
    networks:
      - imobzy
    cpus: "1.00"
    mem_limit: 1g
    logging: *default-logging
    restart: unless-stopped

  document-worker:
    build:
      context: .
      dockerfile: Dockerfile.document-worker
    env_file:
      - .env.production
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WEBHOOK_URL: http://api:3002/api/documents/webhook/worker-result
      DOCUMENT_WEBHOOK_SECRET: ${DOCUMENT_WEBHOOK_SECRET:?set DOCUMENT_WEBHOOK_SECRET}
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - imobzy
    cpus: "1.00"
    mem_limit: 1g
    logging: *default-logging
    restart: unless-stopped

volumes:
  whatsapp_sessions:
  waha_sessions:
  traefik_acme:

networks:
  imobzy:
    driver: bridge
