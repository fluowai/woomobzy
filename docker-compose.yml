services:
  proxy:
    image: caddy:2.8-alpine
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "8081:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: same-origin
        VITE_WHATSAPP_API_URL: /api/whatsapp
        VITE_WHATSAPP_WS_URL: /api/whatsapp/ws
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_PANEL_URL: ${VITE_PANEL_URL:-http://localhost:8080}
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3002
      WHATSAPP_API_URL: http://whatsapp-service:3100
      WHATSMEOW_URL: http://whatsapp-service:3100
      AGRO_INTEL_URL: http://agro-intelligence:8000
      ALLOWED_ORIGINS: http://localhost:8081,http://localhost:8080,http://localhost:3006,http://localhost:3002
      CORS_ORIGINS: http://localhost:8081,http://localhost:8080,http://localhost:3006,http://localhost:3002
    depends_on:
      whatsapp-service:
        condition: service_started
      agro-intelligence:
        condition: service_started
    expose:
      - "3002"
    restart: unless-stopped

  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3100
      NODE_URL: http://api:3002
      WHATSMEOW_URL: http://whatsapp-service:3100
      WHATSAPP_API_URL: http://whatsapp-service:3100
      PGSSLMODE: require
      CORS_ORIGINS: http://localhost:8081,http://localhost:8080,http://localhost:3006,http://localhost:3002
      ALLOWED_ORIGINS: http://localhost:8081,http://localhost:8080,http://localhost:3006,http://localhost:3002
    volumes:
      - whatsapp_sessions:/app/.sessions
    expose:
      - "3100"
    restart: unless-stopped

  agro-intelligence:
    build:
      context: .
      dockerfile: Dockerfile.agro
    expose:
      - "8000"
    restart: unless-stopped

volumes:
  whatsapp_sessions:
