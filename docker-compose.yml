name: imobzy

services:
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/traefik/dynamic:ro
      - ./traefik/acme.json:/traefik/acme.json
    networks:
      - imobzy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: same-origin
        VITE_WHATSAPP_API_URL: /api/whatsapp
        VITE_WHATSAPP_WS_URL: /api/whatsapp/ws
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_PANEL_URL: ${APP_URL:-https://app.imobfluow.com.br}
    env_file:
      - .env.production
    environment:
      VITE_API_URL: same-origin
      VITE_WHATSAPP_API_URL: /api/whatsapp
      VITE_WHATSAPP_WS_URL: /api/whatsapp/ws
      VITE_PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://imobfluow.com.br}
      VITE_PANEL_URL: ${APP_URL:-https://app.imobfluow.com.br}
      VITE_PLATFORM_IP: ${PLATFORM_PUBLIC_IP:-207.58.153.219}
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - imobzy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3002
      TRAEFIK_DYNAMIC_DIR: /traefik/dynamic
      PLATFORM_PUBLIC_IP: ${PLATFORM_PUBLIC_IP:-207.58.153.219}
      VITE_PLATFORM_IP: ${PLATFORM_PUBLIC_IP:-207.58.153.219}
      WHATSAPP_API_URL: http://whatsapp-service:3100
      WHATSMEOW_URL: http://whatsapp-service:3100
      AGRO_INTEL_URL: http://agro-intelligence:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://app.imobfluow.com.br,https://imobfluow.com.br,https://www.imobfluow.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.imobfluow.com.br,https://imobfluow.com.br,https://www.imobfluow.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br}
    volumes:
      - ./traefik/dynamic:/traefik/dynamic
    expose:
      - "3002"
    depends_on:
      whatsapp-service:
        condition: service_healthy
      agro-intelligence:
        condition: service_started
      document-worker:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - imobzy
    restart: unless-stopped

  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3100
      NODE_URL: http://api:3002
      WHATSMEOW_URL: http://whatsapp-service:3100
      WHATSAPP_API_URL: http://whatsapp-service:3100
      PGSSLMODE: require
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.imobfluow.com.br,https://imobfluow.com.br,https://www.imobfluow.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://app.imobfluow.com.br,https://imobfluow.com.br,https://www.imobfluow.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br}
    volumes:
      - whatsapp_sessions:/app/.sessions
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3100/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - imobzy
    restart: unless-stopped

  agro-intelligence:
    build:
      context: .
      dockerfile: Dockerfile.agro
    expose:
      - "8000"
    networks:
      - imobzy
    restart: unless-stopped

  document-worker:
    build:
      context: .
      dockerfile: Dockerfile.document-worker
    env_file:
      - .env.production
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WEBHOOK_URL: http://api:3002/api/documents/webhook/worker-result
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - imobzy
    restart: unless-stopped

volumes:
  whatsapp_sessions:

networks:
  imobzy:
    driver: bridge
