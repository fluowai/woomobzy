x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "3"

x-public-env: &public-env
  VITE_API_URL: "same-origin"
  VITE_WHATSAPP_API_URL: "/api/whatsapp"
  VITE_WHATSAPP_WS_URL: "/api/whatsapp/ws"
  VITE_SUPABASE_URL: "${VITE_SUPABASE_URL}"
  VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY}"
  VITE_PANEL_URL: "https://imobfluow.consultio.com.br"
  VITE_PUBLIC_APP_URL: "https://imobfluow.consultio.com.br"
  VITE_PLATFORM_IP: "207.58.153.219"

x-backend-env: &backend-env
  NODE_ENV: "production"
  ALLOWED_ORIGINS: "https://imobfluow.consultio.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br"
  CORS_ORIGINS: "https://imobfluow.consultio.com.br,https://okaimoveis.com.br,https://www.okaimoveis.com.br"
  VITE_SUPABASE_URL: "${VITE_SUPABASE_URL}"
  VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY}"
  SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
  SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET}"
  DATABASE_URL: "${DATABASE_URL}"
  SUPABASE_DB_URL: "${SUPABASE_DB_URL}"
  PGSSLMODE: "require"
  NODE_URL: "http://api:3002"
  WHATSAPP_API_URL: "http://whatsapp-service:3100"
  WHATSMEOW_URL: "http://whatsapp-service:3100"
  WHATSAPP_SERVICE_TOKEN: "${WHATSAPP_SERVICE_TOKEN}"
  WHATSAPP_INTERNAL_TOKEN: "${WHATSAPP_INTERNAL_TOKEN}"
  WHATSAPP_WS_JWT_SECRET: "${WHATSAPP_WS_JWT_SECRET}"
  WHATSAPP_AI_AUTOMATION: "true"
  RABBITMQ_URL: "amqp://${RABBITMQ_USER:-imobzy}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
  MEDIA_STORAGE_PROVIDER: "minio"
  MINIO_ENDPOINT: "${MINIO_ENDPOINT}"
  MINIO_PUBLIC_URL: "${MINIO_ENDPOINT}"
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
  MINIO_REGION: "us-east-1"
  MINIO_MEDIA_BUCKET: "${MINIO_MEDIA_BUCKET:-imobzycrm}"
  MINIO_WHATSAPP_BUCKET: "${MINIO_WHATSAPP_BUCKET:-imobzywhatsapp}"
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  GROQ_API_KEY: ""

services:
  frontend:
    image: ghcr.io/fluowai/woomobzy-frontend:latest
    environment:
      <<: *public-env
    networks:
      - v5company1
      - imobfluow_internal
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        order: start-first
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: "256M"
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=v5company1"
        - "traefik.http.routers.imobfluow_frontend.rule=Host(`imobfluow.consultio.com.br`) || Host(`okaimoveis.com.br`) || Host(`www.okaimoveis.com.br`)"
        - "traefik.http.routers.imobfluow_frontend.entrypoints=websecure"
        - "traefik.http.routers.imobfluow_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobfluow_frontend.priority=1"
        - "traefik.http.routers.imobfluow_frontend.service=imobfluow_frontend"
        - "traefik.http.services.imobfluow_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/woomobzy-api:latest
    environment:
      <<: *backend-env
      PORT: "3002"
      AGRO_INTEL_URL: "http://agro-intelligence:8000"
      TRAEFIK_DYNAMIC_DIR: "/app/traefik/dynamic"
    volumes:
      - imobzy_traefik_dynamic:/app/traefik/dynamic
    networks:
      - v5company1
      - imobfluow_internal
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        order: start-first
        failure_action: rollback
      resources:
        limits:
          cpus: "1.00"
          memory: "768M"
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=v5company1"
        - "traefik.http.routers.imobfluow_whatsapp_ws.rule=(Host(`imobfluow.consultio.com.br`) || Host(`okaimoveis.com.br`) || Host(`www.okaimoveis.com.br`)) && PathPrefix(`/api/whatsapp/ws`)"
        - "traefik.http.routers.imobfluow_whatsapp_ws.entrypoints=websecure"
        - "traefik.http.routers.imobfluow_whatsapp_ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobfluow_whatsapp_ws.priority=20"
        - "traefik.http.routers.imobfluow_whatsapp_ws.service=imobfluow_api"
        - "traefik.http.routers.imobfluow_api.rule=(Host(`imobfluow.consultio.com.br`) || Host(`okaimoveis.com.br`) || Host(`www.okaimoveis.com.br`)) && PathPrefix(`/api`)"
        - "traefik.http.routers.imobfluow_api.entrypoints=websecure"
        - "traefik.http.routers.imobfluow_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobfluow_api.priority=10"
        - "traefik.http.routers.imobfluow_api.service=imobfluow_api"
        - "traefik.http.services.imobfluow_api.loadbalancer.server.port=3002"

  whatsapp-service:
    image: ghcr.io/fluowai/woomobzy-whatsapp:latest
    environment:
      <<: *backend-env
      PORT: "3100"
    volumes:
      - whatsapp_sessions:/app/.sessions
    networks:
      - imobfluow_internal
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3100/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        order: start-first
        failure_action: rollback
      resources:
        limits:
          cpus: "1.50"
          memory: "1G"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-imobzy}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - imobfluow_internal
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          cpus: "0.50"
          memory: "512M"

  agro-intelligence:
    image: ghcr.io/fluowai/woomobzy-agro:latest
    networks:
      - imobfluow_internal
    logging: *default-logging
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          cpus: "1.00"
          memory: "1G"

volumes:
  whatsapp_sessions:
  rabbitmq_data:
  imobzy_traefik_dynamic:
    external: true

networks:
  v5company1:
    external: true
  imobfluow_internal:
    driver: overlay
