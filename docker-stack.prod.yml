services:
  frontend:
    image: ghcr.io/fluowai/woomobzy-frontend:latest
    environment:
      VITE_API_URL: "same-origin"
      VITE_WHATSAPP_API_URL: "/api/whatsapp"
      VITE_WHATSAPP_WS_URL: "/api/whatsapp/ws"
      VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:?set VITE_SUPABASE_URL}"
      VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:?set VITE_SUPABASE_ANON_KEY}"
      VITE_PANEL_URL: "https://app.imobfluow.com.br"
      VITE_PUBLIC_APP_URL: "https://imobfluow.com.br"
      VITE_PLATFORM_IP: "${PLATFORM_PUBLIC_IP:-207.58.153.219}"
    networks:
      - consultio1
      - imobfluow_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=consultio1"
        - "traefik.http.routers.imobfluow_frontend.rule=Host(`app.imobfluow.com.br`) || Host(`imobfluow.com.br`) || Host(`www.imobfluow.com.br`)"
        - "traefik.http.routers.imobfluow_frontend.entrypoints=websecure"
        - "traefik.http.routers.imobfluow_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobfluow_frontend.priority=1"
        - "traefik.http.routers.imobfluow_frontend.service=imobfluow_frontend"
        - "traefik.http.services.imobfluow_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/woomobzy-api:latest
    environment:
      NODE_ENV: production
      PORT: 3002
      ALLOWED_ORIGINS: "https://app.imobfluow.com.br,https://imobfluow.com.br,https://www.imobfluow.com.br"
      CORS_ORIGINS: "https://app.imobfluow.com.br,https://imobfluow.com.br,https://www.imobfluow.com.br"
      VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:?set VITE_SUPABASE_URL}"
      VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:?set VITE_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:?set SUPABASE_SERVICE_ROLE_KEY}"
      SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET:?set SUPABASE_JWT_SECRET}"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL}"
      SUPABASE_DB_URL: "${SUPABASE_DB_URL:?set SUPABASE_DB_URL}"
      PGSSLMODE: require
      WHATSAPP_API_URL: "http://whatsapp-service:3100"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      AGRO_INTEL_URL: "http://agro-intelligence:8000"
      NODE_URL: "http://api:3002"
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: "sua-api-key-do-gemini"
      GROQ_API_KEY: "sua-api-key-do-groq"
      EMAIL_HOST: ""
      EMAIL_PORT: 587
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""
      WHATSAPP_INTERNAL_TOKEN: "${WHATSAPP_INTERNAL_TOKEN:?set WHATSAPP_INTERNAL_TOKEN}"
      WHATSAPP_AI_AUTOMATION: "true"
      TRAEFIK_DYNAMIC_DIR: "/app/traefik/dynamic"
    volumes:
      - imobzy_traefik_dynamic:/app/traefik/dynamic
    networks:
      - consultio1
      - imobfluow_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=consultio1"
        - "traefik.http.routers.imobfluow_api.rule=(Host(`app.imobfluow.com.br`) || Host(`imobfluow.com.br`) || Host(`www.imobfluow.com.br`)) && PathPrefix(`/api`)"
        - "traefik.http.routers.imobfluow_api.entrypoints=websecure"
        - "traefik.http.routers.imobfluow_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobfluow_api.priority=10"
        - "traefik.http.routers.imobfluow_api.service=imobfluow_api"
        - "traefik.http.services.imobfluow_api.loadbalancer.server.port=3002"

  whatsapp-service:
    image: ghcr.io/fluowai/woomobzy-whatsapp:latest
    environment:
      NODE_ENV: production
      PORT: 3100
      ALLOWED_ORIGINS: "https://app.imobfluow.com.br,https://imobfluow.com.br,https://www.imobfluow.com.br"
      CORS_ORIGINS: "https://app.imobfluow.com.br,https://imobfluow.com.br,https://www.imobfluow.com.br"
      VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:?set VITE_SUPABASE_URL}"
      VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:?set VITE_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:?set SUPABASE_SERVICE_ROLE_KEY}"
      SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET:?set SUPABASE_JWT_SECRET}"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL}"
      SUPABASE_DB_URL: "${SUPABASE_DB_URL:?set SUPABASE_DB_URL}"
      PGSSLMODE: require
      NODE_URL: "http://api:3002"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      WHATSAPP_API_URL: "http://whatsapp-service:3100"
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: "sua-api-key-do-gemini"
      GROQ_API_KEY: "sua-api-key-do-groq"
      WHATSAPP_INTERNAL_TOKEN: "${WHATSAPP_INTERNAL_TOKEN:?set WHATSAPP_INTERNAL_TOKEN}"
      WHATSAPP_AI_AUTOMATION: "true"
    volumes:
      - whatsapp_sessions:/app/.sessions
    networks:
      - consultio1
      - imobfluow_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=consultio1"
        - "traefik.http.routers.imobfluow_whatsapp_ws.rule=(Host(`app.imobfluow.com.br`) || Host(`imobfluow.com.br`) || Host(`www.imobfluow.com.br`)) && PathPrefix(`/api/whatsapp/ws`)"
        - "traefik.http.routers.imobfluow_whatsapp_ws.entrypoints=websecure"
        - "traefik.http.routers.imobfluow_whatsapp_ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobfluow_whatsapp_ws.priority=20"
        - "traefik.http.routers.imobfluow_whatsapp_ws.middlewares=imobfluow_whatsapp_ws_rewrite"
        - "traefik.http.routers.imobfluow_whatsapp_ws.service=imobfluow_whatsapp_ws"
        - "traefik.http.middlewares.imobfluow_whatsapp_ws_rewrite.replacepathregex.regex=^/api/whatsapp/ws(.*)"
        - "traefik.http.middlewares.imobfluow_whatsapp_ws_rewrite.replacepathregex.replacement=/ws$$1"
        - "traefik.http.services.imobfluow_whatsapp_ws.loadbalancer.server.port=3100"

  agro-intelligence:
    image: ghcr.io/fluowai/woomobzy-agro:latest
    networks:
      - imobfluow_internal
    deploy:
      restart_policy:
        condition: any

volumes:
  whatsapp_sessions:
  imobzy_traefik_dynamic:
    external: true

networks:
  consultio1:
    external: true
    name: consultio1
  imobfluow_internal:
    driver: overlay
