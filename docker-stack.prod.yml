services:
  proxy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    command:
      - sh
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        imobzy.consultio.com.br {
          encode gzip zstd

          handle /api/whatsapp/ws* {
            rewrite * /ws
            reverse_proxy whatsapp-service:3100
          }

          handle /api/* {
            reverse_proxy api:3002
          }

          handle /health {
            reverse_proxy api:3002
          }

          handle {
            reverse_proxy frontend:80
          }
        }
        EOF
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      restart_policy:
        condition: any

  frontend:
    image: ghcr.io/fluowai/woomobzy-frontend:latest
    environment:
      VITE_API_URL: "same-origin"
      VITE_WHATSAPP_API_URL: "/api/whatsapp"
      VITE_WHATSAPP_WS_URL: "/api/whatsapp/ws"
      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      VITE_PANEL_URL: "https://imobzy.consultio.com.br"
    deploy:
      restart_policy:
        condition: any

  api:
    image: ghcr.io/fluowai/woomobzy-api:latest
    environment:
      NODE_ENV: production
      PORT: 3002

      ALLOWED_ORIGINS: "https://imobzy.consultio.com.br"
      CORS_ORIGINS: "https://imobzy.consultio.com.br"

      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      SUPABASE_SERVICE_ROLE_KEY: "TROCAR_AQUI_SUPABASE_SERVICE_ROLE_KEY"
      SUPABASE_JWT_SECRET: "TROCAR_AQUI_SUPABASE_JWT_SECRET"

      DATABASE_URL: "TROCAR_AQUI_DATABASE_URL"
      SUPABASE_DB_URL: "TROCAR_AQUI_SUPABASE_DB_URL"
      PGSSLMODE: require

      WHATSAPP_API_URL: "http://whatsapp-service:3100"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      AGRO_INTEL_URL: "http://agro-intelligence:8000"
      NODE_URL: "http://api:3002"

      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""

      EMAIL_HOST: ""
      EMAIL_PORT: 587
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""

      WHATSAPP_INTERNAL_TOKEN: "TROCAR_AQUI_TOKEN_GRANDE"
      WHATSAPP_AI_AUTOMATION: "true"
    deploy:
      restart_policy:
        condition: any

  whatsapp-service:
    image: ghcr.io/fluowai/woomobzy-whatsapp:latest
    environment:
      NODE_ENV: production
      PORT: 3100

      ALLOWED_ORIGINS: "https://imobzy.consultio.com.br"
      CORS_ORIGINS: "https://imobzy.consultio.com.br"

      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      SUPABASE_SERVICE_ROLE_KEY: "TROCAR_AQUI_SUPABASE_SERVICE_ROLE_KEY"
      SUPABASE_JWT_SECRET: "TROCAR_AQUI_SUPABASE_JWT_SECRET"
      DATABASE_URL: "TROCAR_AQUI_DATABASE_URL"
      SUPABASE_DB_URL: "TROCAR_AQUI_SUPABASE_DB_URL"
      PGSSLMODE: require

      NODE_URL: "http://api:3002"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      WHATSAPP_API_URL: "http://whatsapp-service:3100"

      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""
      WHATSAPP_INTERNAL_TOKEN: "TROCAR_AQUI_TOKEN_GRANDE"
      WHATSAPP_AI_AUTOMATION: "true"
    volumes:
      - whatsapp_sessions:/app/.sessions
    deploy:
      restart_policy:
        condition: any

  agro-intelligence:
    image: ghcr.io/fluowai/woomobzy-agro:latest
    deploy:
      restart_policy:
        condition: any

volumes:
  caddy_data:
  caddy_config:
  whatsapp_sessions:
