services:
  frontend:
    image: ghcr.io/fluowai/woomobzy-frontend:latest
    environment:
      VITE_API_URL: "same-origin"
      VITE_WHATSAPP_API_URL: "/api/whatsapp"
      VITE_WHATSAPP_WS_URL: "/api/whatsapp/ws"
      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      VITE_PANEL_URL: "https://crmimobzy.consultio.com.br"
    networks:
      - network_public
      - imobzy_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.imobzy_frontend.rule=Host(`crmimobzy.consultio.com.br`)"
        - "traefik.http.routers.imobzy_frontend.entrypoints=websecure"
        - "traefik.http.routers.imobzy_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobzy_frontend.priority=1"
        - "traefik.http.routers.imobzy_frontend.service=imobzy_frontend"
        - "traefik.http.services.imobzy_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/woomobzy-api:latest
    environment:
      NODE_ENV: production
      PORT: 3002

      ALLOWED_ORIGINS: "https://crmimobzy.consultio.com.br"
      CORS_ORIGINS: "https://crmimobzy.consultio.com.br"

      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      SUPABASE_SERVICE_ROLE_KEY: "TROCAR_AQUI_SUPABASE_SERVICE_ROLE_KEY"
      SUPABASE_JWT_SECRET: "TROCAR_AQUI_SUPABASE_JWT_SECRET"

      DATABASE_URL: "TROCAR_AQUI_DATABASE_URL"
      SUPABASE_DB_URL: "TROCAR_AQUI_SUPABASE_DB_URL"
      PGSSLMODE: require

      WHATSAPP_API_URL: "http://whatsapp-service:3100"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      AGRO_INTEL_URL: "http://agro-intelligence:8000"
      NODE_URL: "http://api:3002"

      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""

      EMAIL_HOST: ""
      EMAIL_PORT: 587
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""

      WHATSAPP_INTERNAL_TOKEN: "TROCAR_AQUI_TOKEN_GRANDE"
      WHATSAPP_AI_AUTOMATION: "true"
    networks:
      - network_public
      - imobzy_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.imobzy_api.rule=Host(`crmimobzy.consultio.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.imobzy_api.entrypoints=websecure"
        - "traefik.http.routers.imobzy_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobzy_api.priority=10"
        - "traefik.http.routers.imobzy_api.service=imobzy_api"
        - "traefik.http.services.imobzy_api.loadbalancer.server.port=3002"

  whatsapp-service:
    image: ghcr.io/fluowai/woomobzy-whatsapp:latest
    environment:
      NODE_ENV: production
      PORT: 3100

      ALLOWED_ORIGINS: "https://crmimobzy.consultio.com.br"
      CORS_ORIGINS: "https://crmimobzy.consultio.com.br"

      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      SUPABASE_SERVICE_ROLE_KEY: "TROCAR_AQUI_SUPABASE_SERVICE_ROLE_KEY"
      SUPABASE_JWT_SECRET: "TROCAR_AQUI_SUPABASE_JWT_SECRET"
      DATABASE_URL: "TROCAR_AQUI_DATABASE_URL"
      SUPABASE_DB_URL: "TROCAR_AQUI_SUPABASE_DB_URL"
      PGSSLMODE: require

      NODE_URL: "http://api:3002"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      WHATSAPP_API_URL: "http://whatsapp-service:3100"

      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""
      WHATSAPP_INTERNAL_TOKEN: "TROCAR_AQUI_TOKEN_GRANDE"
      WHATSAPP_AI_AUTOMATION: "true"
    volumes:
      - whatsapp_sessions:/app/.sessions
    networks:
      - network_public
      - imobzy_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.imobzy_whatsapp_ws.rule=Host(`crmimobzy.consultio.com.br`) && PathPrefix(`/api/whatsapp/ws`)"
        - "traefik.http.routers.imobzy_whatsapp_ws.entrypoints=websecure"
        - "traefik.http.routers.imobzy_whatsapp_ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobzy_whatsapp_ws.priority=20"
        - "traefik.http.routers.imobzy_whatsapp_ws.middlewares=imobzy_whatsapp_ws_rewrite"
        - "traefik.http.routers.imobzy_whatsapp_ws.service=imobzy_whatsapp_ws"
        - "traefik.http.middlewares.imobzy_whatsapp_ws_rewrite.replacepathregex.regex=^/api/whatsapp/ws(.*)"
        - "traefik.http.middlewares.imobzy_whatsapp_ws_rewrite.replacepathregex.replacement=/ws$$1"
        - "traefik.http.services.imobzy_whatsapp_ws.loadbalancer.server.port=3100"

  agro-intelligence:
    image: ghcr.io/fluowai/woomobzy-agro:latest
    networks:
      - imobzy_internal
    deploy:
      restart_policy:
        condition: any

volumes:
  whatsapp_sessions:

networks:
  network_public:
    external: true
    name: network_public
  imobzy_internal:
    driver: overlay
