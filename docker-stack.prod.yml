services:
  proxy:
    image: caddy:2.8-alpine
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
      - "443:443"
    command:
      - sh
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        imobzy.consultio.com.br {
          encode gzip zstd

          handle /api/whatsapp/ws* {
            rewrite * /ws
            reverse_proxy whatsapp-service:3100
          }

          handle /api/* {
            reverse_proxy api:3002
          }

          handle /health {
            reverse_proxy api:3002
          }

          handle {
            reverse_proxy frontend:80
          }
        }
        EOF
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: same-origin
        VITE_WHATSAPP_API_URL: /api/whatsapp
        VITE_WHATSAPP_WS_URL: /api/whatsapp/ws
        VITE_SUPABASE_URL: "https://seu-projeto.supabase.co"
        VITE_SUPABASE_ANON_KEY: "sua-chave-anon-publica"
        VITE_PANEL_URL: "https://imobzy.consultio.com.br"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3002

      # Dominio / CORS
      ALLOWED_ORIGINS: "https://imobzy.consultio.com.br"
      CORS_ORIGINS: "https://imobzy.consultio.com.br"

      # Supabase
      VITE_SUPABASE_URL: "https://seu-projeto.supabase.co"
      VITE_SUPABASE_ANON_KEY: "sua-chave-anon-publica"
      SUPABASE_SERVICE_ROLE_KEY: "sua-service-role-key"
      SUPABASE_JWT_SECRET: "seu-jwt-secret"

      # Banco
      DATABASE_URL: "postgresql://user:password@host:5432/postgres?sslmode=require"
      SUPABASE_DB_URL: "postgresql://user:password@host:5432/postgres?sslmode=require"
      PGSSLMODE: require

      # URLs internas Docker
      WHATSAPP_API_URL: "http://whatsapp-service:3100"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      AGRO_INTEL_URL: "http://agro-intelligence:8000"
      NODE_URL: "http://api:3002"

      # IA / integrações opcionais
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""

      # Email opcional
      EMAIL_HOST: ""
      EMAIL_PORT: 587
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""

      # WhatsApp / automacao
      WHATSAPP_INTERNAL_TOKEN: "troque-por-um-token-grande"
      WHATSAPP_AI_AUTOMATION: "true"
    depends_on:
      - whatsapp-service
      - agro-intelligence
    expose:
      - "3002"
    restart: unless-stopped

  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    environment:
      NODE_ENV: production
      PORT: 3100

      # Dominio / CORS
      ALLOWED_ORIGINS: "https://imobzy.consultio.com.br"
      CORS_ORIGINS: "https://imobzy.consultio.com.br"

      # Supabase / banco
      VITE_SUPABASE_URL: "https://seu-projeto.supabase.co"
      VITE_SUPABASE_ANON_KEY: "sua-chave-anon-publica"
      SUPABASE_SERVICE_ROLE_KEY: "sua-service-role-key"
      SUPABASE_JWT_SECRET: "seu-jwt-secret"
      DATABASE_URL: "postgresql://user:password@host:5432/postgres?sslmode=require"
      SUPABASE_DB_URL: "postgresql://user:password@host:5432/postgres?sslmode=require"
      PGSSLMODE: require

      # URLs internas Docker
      NODE_URL: "http://api:3002"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      WHATSAPP_API_URL: "http://whatsapp-service:3100"

      # IA / automacao
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""
      WHATSAPP_INTERNAL_TOKEN: "troque-por-um-token-grande"
      WHATSAPP_AI_AUTOMATION: "true"
    volumes:
      - whatsapp_sessions:/app/.sessions
    expose:
      - "3100"
    restart: unless-stopped

  agro-intelligence:
    build:
      context: .
      dockerfile: Dockerfile.agro
    expose:
      - "8000"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  whatsapp_sessions:
