services:
  frontend:
    image: ghcr.io/fluowai/woomobzy-frontend:latest
    environment:
      VITE_API_URL: "same-origin"
      VITE_WHATSAPP_API_URL: "/api/whatsapp"
      VITE_WHATSAPP_WS_URL: "/api/whatsapp/ws"
      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      VITE_PANEL_URL: "https://imobfluow.com.br"
      VITE_PUBLIC_APP_URL: "https://imobfluow.com.br"
      VITE_PLATFORM_IP: "IP_DO_SERVIDOR"
    networks:
      - network_public
      - imobzy_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.imobzy_frontend.rule=Host(`imobfluow.com.br`, `www.imobfluow.com.br`, `imobzy.consultio.com.br`)"
        - "traefik.http.routers.imobzy_frontend.entrypoints=websecure"
        - "traefik.http.routers.imobzy_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobzy_frontend.priority=1"
        - "traefik.http.routers.imobzy_frontend.service=imobzy_frontend"
        - "traefik.http.services.imobzy_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/woomobzy-api:latest
    environment:
      NODE_ENV: production
      PORT: 3002

      ALLOWED_ORIGINS: "https://imobfluow.com.br,https://www.imobfluow.com.br"
      CORS_ORIGINS: "https://imobfluow.com.br,https://www.imobfluow.com.br"
      PUBLIC_APP_URL: "https://imobfluow.com.br"
      VITE_PUBLIC_APP_URL: "https://imobfluow.com.br"
      PLATFORM_PUBLIC_IP: "IP_DO_SERVIDOR"

      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      SUPABASE_SERVICE_ROLE_KEY: "TROCAR_AQUI_SUPABASE_SERVICE_ROLE_KEY"
      SUPABASE_JWT_SECRET: "TROCAR_AQUI_SUPABASE_JWT_SECRET"

      DATABASE_URL: "postgresql://postgres.lkzcsaydpcnypdevoikr:rIGzYBzBCDZslOOH@aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require&default_query_exec_mode=simple_protocol"
      SUPABASE_DB_URL: "postgresql://postgres.lkzcsaydpcnypdevoikr:rIGzYBzBCDZslOOH@aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require&default_query_exec_mode=simple_protocol"
      PGSSLMODE: require

      MEDIA_STORAGE_PROVIDER: "minio"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_PUBLIC_URL: "https://media.seu-dominio.com"
      MINIO_ACCESS_KEY: "TROCAR_AQUI_MINIO_ACCESS_KEY"
      MINIO_SECRET_KEY: "TROCAR_AQUI_MINIO_SECRET_KEY"
      MINIO_REGION: "us-east-1"
      MINIO_MEDIA_BUCKET: "imobzy-media"
      MINIO_WHATSAPP_BUCKET: "whatsapp-media"
      MINIO_DOCUMENTS_BUCKET: "imobzy-documents"
      MINIO_EXPORTS_BUCKET: "imobzy-exports"
      MINIO_BACKUPS_BUCKET: "imobzy-backups"

      WHATSAPP_API_URL: "http://whatsapp-service:3100"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      AGRO_INTEL_URL: "http://agro-intelligence:8000"
      NODE_URL: "http://api:3002"

      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""

      EMAIL_HOST: ""
      EMAIL_PORT: 587
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""

      WHATSAPP_INTERNAL_TOKEN: "TROCAR_AQUI_TOKEN_GRANDE"
      WHATSAPP_AI_AUTOMATION: "true"
    networks:
      - network_public
      - imobzy_internal
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.imobzy_api.rule=Host(`imobfluow.com.br`, `www.imobfluow.com.br`, `imobzy.consultio.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.imobzy_api.entrypoints=websecure"
        - "traefik.http.routers.imobzy_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imobzy_api.priority=10"
        - "traefik.http.routers.imobzy_api.service=imobzy_api"
        - "traefik.http.services.imobzy_api.loadbalancer.server.port=3002"

  whatsapp-service:
    image: ghcr.io/fluowai/woomobzy-whatsapp:latest
    environment:
      NODE_ENV: production
      PORT: 3100

      ALLOWED_ORIGINS: "https://imobfluow.com.br,https://www.imobfluow.com.br"
      CORS_ORIGINS: "https://imobfluow.com.br,https://www.imobfluow.com.br"
      PLATFORM_PUBLIC_IP: "IP_DO_SERVIDOR"

      VITE_SUPABASE_URL: "TROCAR_AQUI_SUPABASE_URL"
      VITE_SUPABASE_ANON_KEY: "TROCAR_AQUI_SUPABASE_ANON_KEY"
      SUPABASE_SERVICE_ROLE_KEY: "TROCAR_AQUI_SUPABASE_SERVICE_ROLE_KEY"
      SUPABASE_JWT_SECRET: "TROCAR_AQUI_SUPABASE_JWT_SECRET"
      DATABASE_URL: "postgresql://postgres.lkzcsaydpcnypdevoikr:rIGzYBzBCDZslOOH@aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require&default_query_exec_mode=simple_protocol"
      SUPABASE_DB_URL: "postgresql://postgres.lkzcsaydpcnypdevoikr:rIGzYBzBCDZslOOH@aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require&default_query_exec_mode=simple_protocol"
      PGSSLMODE: require

      MEDIA_STORAGE_PROVIDER: "minio"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_PUBLIC_URL: "https://media.seu-dominio.com"
      MINIO_ACCESS_KEY: "TROCAR_AQUI_MINIO_ACCESS_KEY"
      MINIO_SECRET_KEY: "TROCAR_AQUI_MINIO_SECRET_KEY"
      MINIO_REGION: "us-east-1"
      MINIO_WHATSAPP_BUCKET: "whatsapp-media"

      NODE_URL: "http://api:3002"
      WHATSMEOW_URL: "http://whatsapp-service:3100"
      WHATSAPP_API_URL: "http://whatsapp-service:3100"

      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""
      WHATSAPP_INTERNAL_TOKEN: "TROCAR_AQUI_TOKEN_GRANDE"
      WHATSAPP_AI_AUTOMATION: "true"
    volumes:
      - whatsapp_sessions:/app/.sessions
    networks:
      - imobzy_internal
    deploy:
      restart_policy:
        condition: any

  agro-intelligence:
    image: ghcr.io/fluowai/woomobzy-agro:latest
    networks:
      - imobzy_internal
    deploy:
      restart_policy:
        condition: any

volumes:
  whatsapp_sessions:

networks:
  network_public:
    external: true
    name: network_public
  imobzy_internal:
    driver: overlay
