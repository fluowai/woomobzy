server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /sw.js {
    default_type application/javascript;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    if ($host ~* ^(okaimoveis\.com\.br|www\.okaimoveis\.com\.br)$) {
      return 200 "self.addEventListener('install',event=>self.skipWaiting());self.addEventListener('activate',event=>event.waitUntil(self.registration.unregister().then(()=>self.clients.matchAll({type:'window'})).then(clients=>clients.forEach(client=>client.navigate(client.url)))));";
    }

    try_files /sw.js =404;
  }

  location ~ ^/workbox-[A-Za-z0-9_-]+\.js$ {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location = /env-config.js {
    try_files /env-config.js =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /favicon.ico {
    try_files /logo-imobzy.png =404;
    add_header Cache-Control "public, max-age=86400";
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
