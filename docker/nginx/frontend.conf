map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /sw.js {
    default_type application/javascript;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    return 200 "self.addEventListener('install',event=>self.skipWaiting());self.addEventListener('activate',event=>event.waitUntil(self.registration.unregister().then(()=>caches.keys()).then(keys=>Promise.all(keys.map(key=>caches.delete(key)))).then(()=>self.clients.matchAll({type:'window'})).then(clients=>clients.forEach(client=>client.navigate(client.url)))));";
  }

  location ~ ^/workbox-[A-Za-z0-9_-]+\.js$ {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location = /env-config.js {
    try_files /env-config.js =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /favicon.ico {
    try_files /logo-imobzy.png =404;
    add_header Cache-Control "public, max-age=86400";
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Keep cached frontend builds functional while they migrate back to the
  # canonical WhatsApp route handled by the edge router.
  location = /whatsapp-api {
    return 307 /api/whatsapp$is_args$args;
  }

  location ~ ^/whatsapp-api(?<whatsapp_suffix>/.*)$ {
    return 307 /api/whatsapp$whatsapp_suffix$is_args$args;
  }

  # Keep API requests out of the SPA fallback even if the edge router sends
  # them to the frontend service. This also preserves WebSocket upgrades.
  location = /api {
    proxy_pass http://api:3002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }

  location ^~ /api/ {
    proxy_pass http://api:3002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
