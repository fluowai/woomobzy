[phases.setup]
nixPkgs = ["...", "go", "python311"]

[phases.build]
cmds = [
  "npm ci", 
  "cd whatsapp-service && go mod download && go build -o whatsapp-service-bin ./cmd/server/main.go",
  "python3 -m pip install -r server/agro-intelligence/requirements.txt"
]

[start]
cmd = "npm run start:prod"
