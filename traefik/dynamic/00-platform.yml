http:
  routers:
    imobzy_platform_api:
      rule: "(Host(`imob.wootech.com.br`) || Host(`app.imobfluow.com.br`) || Host(`imobfluow.com.br`) || Host(`www.imobfluow.com.br`) || Host(`okaimoveis.com.br`) || Host(`www.okaimoveis.com.br`) || Host(`fazendasbrasil.com`) || Host(`www.fazendasbrasil.com`) || Host(`fazendasbrasil.com.br`) || Host(`www.fazendasbrasil.com.br`)) && PathPrefix(`/api`)"
      entryPoints:
        - websecure
      priority: 1000
      tls:
        certResolver: letsencryptresolver
      service: imobzy_api@file

    imobzy_platform_frontend:
      rule: "Host(`imob.wootech.com.br`) || Host(`app.imobfluow.com.br`) || Host(`imobfluow.com.br`) || Host(`www.imobfluow.com.br`) || Host(`okaimoveis.com.br`) || Host(`www.okaimoveis.com.br`) || Host(`fazendasbrasil.com`) || Host(`www.fazendasbrasil.com`) || Host(`fazendasbrasil.com.br`) || Host(`www.fazendasbrasil.com.br`)"
      entryPoints:
        - websecure
      priority: 100
      tls:
        certResolver: letsencryptresolver
      service: imobzy_frontend@file
